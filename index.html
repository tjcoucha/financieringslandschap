<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Het Solidair Woon Fonds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Albert Sans', sans-serif;
    background: #ffffff;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .logo {
    max-width: 480px;
    width: 80vw;
    margin-bottom: 48px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #1a1a2e;
    color: #fff;
    font-family: 'Albert Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 14px 32px;
    border-radius: 50px;
    text-decoration: none;
    transition: background 200ms ease, transform 200ms ease;
  }
  .btn:hover {
    background: #2d2d4a;
    transform: translateY(-1px);
  }
  .btn svg {
    width: 18px; height: 18px;
    fill: currentColor;
    transition: transform 200ms ease;
  }
  .btn:hover svg {
    transform: translateX(3px);
  }
</style>
</head>
<body>
  <img src="/logo.png" alt="Het Solidair Woon Fonds" class="logo">
  <a href="/financieringslandschap" class="btn">
    Financieringslandschap
    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
  </a>
</body>
</html>
